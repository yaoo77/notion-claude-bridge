<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研修料金シミュレーター</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f7fa;
      color: #333;
    }
    h1 {
      font-size: 1.5rem;
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #555;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 18px;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #3498db;
    }
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .option-item:hover {
      background: #f0f7ff;
    }
    .option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .option-label {
      flex: 1;
      font-size: 0.95rem;
    }
    .option-price {
      font-size: 0.9rem;
      color: #888;
      white-space: nowrap;
    }
    .result-card {
      background: #eaf4ff;
      border: 1px solid #aad4f5;
    }
    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    .breakdown-table td {
      padding: 8px 4px;
      font-size: 0.95rem;
    }
    .breakdown-table td:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .breakdown-table tr.subtotal td {
      border-top: 1px solid #c0d8ef;
      color: #888;
      font-size: 0.85rem;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 2px solid #3498db;
      padding-top: 12px;
      margin-top: 4px;
    }
    .total-label {
      font-weight: bold;
      font-size: 1.05rem;
      color: #2c3e50;
    }
    .total-amount {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2980b9;
    }
    .note {
      font-size: 0.8rem;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>研修料金シミュレーター</h1>

  <div class="card">
    <label for="sessions">研修回数</label>
    <input type="number" id="sessions" value="1" min="1">

    <label for="participants">参加人数</label>
    <input type="number" id="participants" value="1" min="1">

    <label>オプション</label>
    <div class="options-group" id="options">
      <label class="option-item">
        <input type="checkbox" data-price="50000" id="opt1">
        <span class="option-label">事前アンケート作成</span>
        <span class="option-price">50,000円</span>
      </label>
      <label class="option-item">
        <input type="checkbox" data-price="100000" id="opt2">
        <span class="option-label">カスタム教材作成</span>
        <span class="option-price">100,000円</span>
      </label>
      <label class="option-item">
        <input type="checkbox" data-price="80000" id="opt3">
        <span class="option-label">フォローアップ研修（1回）</span>
        <span class="option-price">80,000円</span>
      </label>
      <label class="option-item">
        <input type="checkbox" data-price="30000" id="opt4">
        <span class="option-label">受講者レポート作成</span>
        <span class="option-price">30,000円</span>
      </label>
    </div>
  </div>

  <div class="card result-card">
    <table class="breakdown-table" id="breakdown">
      <tbody></tbody>
    </table>
    <div class="total-row">
      <span class="total-label">合計金額（税抜）</span>
      <span class="total-amount" id="total">¥0</span>
    </div>
    <p class="note">※ 追加参加者費は「追加参加者数 × 10,000円 × 研修回数」で計算しています。</p>
  </div>

  <script>
    const PRICE_PER_SESSION = 600000;
    const PRICE_PER_EXTRA_PARTICIPANT = 10000;

    function formatYen(amount) {
      return '¥' + amount.toLocaleString('ja-JP');
    }

    function calculate() {
      const sessions = Math.max(1, parseInt(document.getElementById('sessions').value) || 1);
      const participants = Math.max(1, parseInt(document.getElementById('participants').value) || 1);
      const extraParticipants = Math.max(participants - 1, 0);

      const trainingFee = sessions * PRICE_PER_SESSION;
      const extraParticipantFee = extraParticipants * PRICE_PER_EXTRA_PARTICIPANT * sessions;

      let optionFee = 0;
      const selectedOptions = [];
      document.querySelectorAll('#options input[type="checkbox"]:checked').forEach(cb => {
        const price = parseInt(cb.dataset.price);
        const name = cb.closest('label').querySelector('.option-label').textContent;
        optionFee += price;
        selectedOptions.push({ name, price });
      });

      const total = trainingFee + extraParticipantFee + optionFee;

      // Build breakdown rows
      const tbody = document.querySelector('#breakdown tbody');
      tbody.innerHTML = '';

      function addRow(label, amount, isSubtotal) {
        const tr = document.createElement('tr');
        if (isSubtotal) tr.className = 'subtotal';
        tr.innerHTML = `<td>${label}</td><td>${formatYen(amount)}</td>`;
        tbody.appendChild(tr);
      }

      addRow(`研修費（${sessions}回 × 600,000円）`, trainingFee);
      addRow(
        `追加参加者費（${extraParticipants}名 × 10,000円 × ${sessions}回）`,
        extraParticipantFee
      );

      if (selectedOptions.length > 0) {
        selectedOptions.forEach(opt => addRow(`オプション: ${opt.name}`, opt.price, true));
        addRow('オプション費 合計', optionFee);
      } else {
        addRow('オプション費', 0);
      }

      document.getElementById('total').textContent = formatYen(total);
    }

    // Attach event listeners
    document.getElementById('sessions').addEventListener('input', calculate);
    document.getElementById('participants').addEventListener('input', calculate);
    document.querySelectorAll('#options input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', calculate);
    });

    // Initial calculation
    calculate();
  </script>
</body>
</html>
