name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          allowed_tools: "Bash(python3:*),Bash(python:*),Bash(pip3:*),Bash(pip:*),Bash(cd:*)"
          claude_args: "--dangerously-skip-permissions"
        env:
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}

      # Claude Code完了後、Notion DB_CCを自動更新
      - name: Update Notion DB_CC
        if: always() && github.event_name == 'issues'
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          # Claude botの最新コメントからPRリンクと結果を取得
          COMMENT=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments --jq '.[-1].body // ""' 2>/dev/null || echo "")
          PR_LINK=$(echo "$COMMENT" | grep -oE 'https://github\.com/[^)]+quick_pull=1[^)]*' | head -1 || echo "")
          SUMMARY=$(echo "$COMMENT" | sed 's/\*\*//g' | head -5 | tr '\n' ' ' | cut -c1-500 || echo "Claude Code completed")

          python3 scripts/update_notion.py \
            --issue-number "$ISSUE_NUMBER" \
            --status "完了" \
            --pr-link "$PR_LINK" \
            --summary "$SUMMARY"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          GH_TOKEN: ${{ github.token }}
